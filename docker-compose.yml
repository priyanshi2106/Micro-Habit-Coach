services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: microhabit
      POSTGRES_PASSWORD: microhabit
      POSTGRES_DB: microhabit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microhabit -d microhabit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
